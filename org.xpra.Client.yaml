app-id: org.xpra.Client
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: xpra
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  - --system-talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.a11y.Bus
  - --own-name=org.xpra.Client

modules:
  # libXres - X11 Resource extension library
  - name: libXres
    sources:
      - type: archive
        url: https://www.x.org/releases/individual/lib/libXres-1.2.3.tar.xz
        sha256: d2de8f5401d6c86a8992791654547eb8def585dfdc0c08cc16e24ef6aeeb69dc

  # pycairo - Python Cairo bindings (built from source for headers)
  - name: pycairo
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/pygobject/pycairo/releases/download/v1.29.0/pycairo-1.29.0.tar.gz
        sha256: f3f7fde97325cae80224c09f12564ef58d0d0f655da0e3b040f5807bd5bd3142

  # PyGObject - Python GObject bindings (built from source for headers)
  - name: pygobject
    buildsystem: meson
    config-opts:
      - -Dpython=python3
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pygobject/3.56/pygobject-3.56.3.tar.gz
        sha256: 12760e4a0e3d04b6eb95e06f7a27e362c826d567ea613373a92c003b6c70d2d6

  # Xpra itself
  - name: xpra
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        PIP_PREFIX: /app
        CFLAGS: -I/app/include/pygobject-3.0 -I/app/include/pycairo
        CXXFLAGS: -I/app/include/pygobject-3.0 -I/app/include/pycairo
    build-commands:
      # Install remaining Python dependencies with pip
      - pip3 install --prefix=/app paramiko cryptography pyopenssl lz4 pillow pyopengl pyopengl-accelerate netifaces zeroconf
      # Install xpra itself
      - python3 setup.py install --prefix=/app --single-version-externally-managed --record=installed-files.txt
      # Install desktop integration files
      - install -Dm755 fs/bin/xpra /app/bin/xpra
      - install -Dm755 fs/bin/xpra_launcher /app/bin/xpra_launcher
      - install -Dm644 org.xpra.Client.desktop /app/share/applications/org.xpra.Client.desktop
      - install -Dm644 org.xpra.Client.metainfo.xml /app/share/metainfo/org.xpra.Client.metainfo.xml
      # Install icons in multiple sizes (48, 128, 192)
      - install -Dm644 fs/share/xpra/icons/xpra.png /app/share/icons/hicolor/48x48/apps/org.xpra.Client.png
      - install -Dm644 fs/share/icons/xpra.png /app/share/icons/hicolor/128x128/apps/org.xpra.Client.png
      - install -Dm644 fs/share/icons/xpra.png /app/share/icons/hicolor/192x192/apps/org.xpra.Client.png
    sources:
      - type: archive
        url: https://api.github.com/repos/Xpra-org/xpra/tarball/v6.4.4
        sha256: d2f1985786cc4a0672a591c05ba437981be1e26450211af3a2f01efc1ac10f36
        dest-filename: xpra-6.4.4.tar.gz
      - type: file
        path: org.xpra.Client.desktop
      - type: file
        path: org.xpra.Client.metainfo.xml
